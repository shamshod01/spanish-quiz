<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스페인어 단어 퀴즈 · 2·3·4과</title>
<style>
  :root{
    --bg:#0f1226; --bg2:#171a35; --card:#1e2246; --card2:#262a52;
    --ink:#f4f5ff; --muted:#a3a7d4; --line:#33386b;
    --red:#e63946; --gold:#ffca3a; --green:#38b000; --grad1:#ff6b6b; --grad2:#ffd166;
    --accent:#7c6bff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    background:radial-gradient(1200px 800px at 50% -10%,#232752 0%,var(--bg) 60%);
    color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;
    padding:18px 14px 40px;
  }
  .wrap{width:100%;max-width:560px}
  header{text-align:center;margin-bottom:16px}
  header h1{font-size:1.5rem;font-weight:800;letter-spacing:-.5px}
  header h1 .flag{background:linear-gradient(90deg,var(--red) 0 33%,var(--gold) 33% 66%,var(--red) 66% 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{color:var(--muted);font-size:.82rem;margin-top:4px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.35)}

  .label{font-size:.78rem;color:var(--muted);font-weight:700;margin:16px 0 8px;display:flex;align-items:center;gap:6px}
  .label:first-child{margin-top:0}
  .opts{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    flex:1 1 auto;min-width:64px;text-align:center;padding:11px 12px;border-radius:12px;
    background:var(--card2);border:1.5px solid var(--line);color:var(--muted);
    font-size:.9rem;font-weight:700;cursor:pointer;transition:.15s;user-select:none;
  }
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:linear-gradient(135deg,var(--accent),#a99bff);color:#fff;border-color:transparent;box-shadow:0 6px 16px rgba(124,107,255,.4)}

  .btn{
    width:100%;padding:15px;border:none;border-radius:14px;font-size:1.02rem;font-weight:800;
    cursor:pointer;margin-top:22px;color:#1a1030;
    background:linear-gradient(135deg,var(--grad1),var(--grad2));
    box-shadow:0 10px 26px rgba(255,107,107,.35);transition:.15s;
  }
  .btn:hover{transform:translateY(-2px)}
  .btn:active{transform:translateY(0)}
  .btn.ghost{background:transparent;color:var(--muted);border:1.5px solid var(--line);box-shadow:none;font-weight:700}
  .btn.ghost:hover{border-color:var(--accent);color:var(--ink)}

  .stat{font-size:.8rem;color:var(--muted);text-align:center;margin-top:14px}
  .stat b{color:var(--gold)}

  /* quiz screen */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
  .pill{font-size:.72rem;font-weight:700;color:var(--muted);background:var(--card);border:1px solid var(--line);padding:6px 11px;border-radius:20px}
  .pill b{color:var(--ink)}
  .streak{color:var(--gold)}
  .bar{height:8px;background:var(--card);border-radius:20px;overflow:hidden;margin-bottom:18px;border:1px solid var(--line)}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--grad1),var(--grad2));transition:width .3s}

  .qcard{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:30px 22px;text-align:center;min-height:150px;display:flex;flex-direction:column;justify-content:center;gap:10px}
  .qtag{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px}
  .qword{font-size:2rem;font-weight:800;line-height:1.25;word-break:keep-all}
  .qword.ko{font-size:1.7rem}
  .qhint{font-size:.8rem;color:var(--muted)}
  .speak{margin-top:6px;display:inline-flex;align-items:center;gap:6px;align-self:center;
    background:var(--card2);border:1.5px solid var(--line);color:var(--gold);
    font-size:.85rem;font-weight:700;padding:8px 16px;border-radius:20px;cursor:pointer;transition:.15s}
  .speak:hover{border-color:var(--gold);transform:scale(1.05)}
  .speak.playing{background:var(--gold);color:#1a1030;border-color:var(--gold)}
  .speak.off{opacity:.4;cursor:not-allowed}
  .rspeak{background:none;border:none;color:var(--gold);font-size:1.05rem;cursor:pointer;padding:2px 6px;flex:0 0 auto}

  .answers{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .ans{
    padding:16px 12px;border-radius:14px;background:var(--card);border:1.5px solid var(--line);
    color:var(--ink);font-size:1rem;font-weight:700;cursor:pointer;transition:.12s;text-align:center;word-break:keep-all;line-height:1.3;
  }
  .ans:hover{border-color:var(--accent);background:var(--card2)}
  .ans.correct{background:rgba(56,176,0,.18);border-color:var(--green);color:#7be05a}
  .ans.wrong{background:rgba(230,57,70,.16);border-color:var(--red);color:#ff8a93}
  .ans.dim{opacity:.45}
  .ans:disabled{cursor:default}

  /* typing mode */
  .typewrap{margin-top:16px}
  .tinput{width:100%;padding:16px;border-radius:14px;background:var(--card);border:1.5px solid var(--line);color:var(--ink);font-size:1.1rem;font-weight:700;text-align:center;outline:none}
  .tinput:focus{border-color:var(--accent)}
  .feedback{text-align:center;font-weight:800;margin-top:14px;min-height:26px;font-size:1rem}
  .feedback.ok{color:#7be05a}
  .feedback.no{color:#ff8a93}
  .feedback small{display:block;color:var(--muted);font-weight:600;font-size:.82rem;margin-top:3px}

  .next{margin-top:14px}

  /* result */
  .result{text-align:center}
  .score-big{font-size:3.4rem;font-weight:800;background:linear-gradient(135deg,var(--grad1),var(--grad2));-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.1}
  .review{margin-top:20px;text-align:left;max-height:320px;overflow-y:auto}
  .review h3{font-size:.85rem;color:var(--muted);margin-bottom:10px}
  .rrow{display:flex;justify-content:space-between;gap:10px;padding:11px 12px;background:var(--card2);border-radius:10px;margin-bottom:7px;font-size:.9rem;align-items:center}
  .rrow .es{font-weight:800}
  .rrow .ko{color:var(--muted);text-align:right}
  .emoji{font-size:2.6rem}
  .hidden{display:none}
  .kbd{font-size:.7rem;color:var(--muted);text-align:center;margin-top:8px}
  @media(max-width:400px){ .qword{font-size:1.7rem} .answers{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="flag">Español</span> 단어 퀴즈 🇪🇸</h1>
    <p>KIIP 2·3·4과 · 단어와 표현 마스터하기</p>
  </header>

  <!-- ================= START ================= -->
  <section id="start" class="card">
    <div class="label">📚 과 선택 (여러 개 선택 가능)</div>
    <div class="opts" id="lessonOpts">
      <div class="chip on" data-lesson="2">2과</div>
      <div class="chip on" data-lesson="3">3과</div>
      <div class="chip on" data-lesson="4">4과</div>
    </div>

    <div class="label">🗂️ 분야 (전체 = 모두)</div>
    <div class="opts" id="catOpts"></div>

    <div class="label">🔄 방향</div>
    <div class="opts" id="dirOpts">
      <div class="chip on" data-dir="es2ko">스페인어 → 한국어</div>
      <div class="chip" data-dir="ko2es">한국어 → 스페인어</div>
      <div class="chip" data-dir="mix">섞기</div>
    </div>

    <div class="label">🎮 방식</div>
    <div class="opts" id="modeOpts">
      <div class="chip on" data-mode="mc">4지선다</div>
      <div class="chip" data-mode="type">직접 입력</div>
      <div class="chip" data-mode="flash">플래시카드</div>
    </div>

    <div class="label">🔢 문제 수</div>
    <div class="opts" id="countOpts">
      <div class="chip" data-count="10">10</div>
      <div class="chip on" data-count="20">20</div>
      <div class="chip" data-count="30">30</div>
      <div class="chip" data-count="0">전체</div>
    </div>

    <div class="label">🔊 발음 (스페인어 자동 재생)</div>
    <div class="opts" id="autoOpts">
      <div class="chip on" data-auto="0">수동 (버튼)</div>
      <div class="chip" data-auto="1">자동 재생</div>
    </div>

    <button class="btn" id="startBtn">시작하기 ▶</button>
    <div class="stat">총 <b id="totalCount">0</b>개 단어·표현 수록</div>
  </section>

  <!-- ================= QUIZ ================= -->
  <section id="quiz" class="hidden">
    <div class="topbar">
      <span class="pill"><b id="qNum">1</b> / <span id="qTot">20</span></span>
      <span class="pill streak">🔥 연속 <b id="streak" style="color:var(--gold)">0</b></span>
      <span class="pill">✅ <b id="correctN">0</b></span>
    </div>
    <div class="bar"><i id="progbar"></i></div>

    <div class="qcard">
      <div class="qtag" id="qtag">스페인어</div>
      <div class="qword" id="qword">—</div>
      <button class="speak" id="speakBtn">🔊 발음 듣기</button>
      <div class="qhint" id="qhint"></div>
    </div>

    <!-- multiple choice -->
    <div class="answers hidden" id="answers"></div>

    <!-- typing -->
    <div class="typewrap hidden" id="typewrap">
      <input class="tinput" id="tinput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="정답 입력 후 Enter">
      <div class="kbd" id="accentHint"></div>
    </div>

    <!-- flashcard -->
    <div class="answers hidden" id="flashans" style="grid-template-columns:1fr 1fr">
      <button class="ans" data-fc="no" style="border-color:var(--red)">🙈 몰라요</button>
      <button class="ans" data-fc="yes" style="border-color:var(--green)">😎 알아요</button>
    </div>

    <div class="feedback" id="feedback"></div>
    <button class="btn next hidden" id="nextBtn">다음 →</button>
    <button class="btn ghost" id="quitBtn" style="margin-top:10px">그만하기</button>
  </section>

  <!-- ================= RESULT ================= -->
  <section id="result" class="hidden">
    <div class="card result">
      <div class="emoji" id="rEmoji">🎉</div>
      <div class="score-big"><span id="rScore">0</span>%</div>
      <div class="stat" style="font-size:.95rem;margin-top:6px"><b id="rCorrect">0</b>개 정답 / <span id="rTotal">0</span>문제 · 최고 연속 <b id="rStreak">0</b>🔥</div>
      <div class="review" id="review"></div>
      <button class="btn" id="retryWrong" style="margin-top:20px">❌ 틀린 것만 다시</button>
      <button class="btn ghost" id="againBtn">🔁 처음으로</button>
    </div>
  </section>
</div>

const $ = id => document.getElementById(id);
let cfg = {lessons:new Set([2,3,4]), cat:'전체', dir:'es2ko', mode:'mc', count:20, auto:false};

/* ============ 발음 (TTS) ============ */
const TTS = ('speechSynthesis' in window);
let esVoice=null;
function pickVoice(){
  if(!TTS) return;
  const vs=speechSynthesis.getVoices();
  esVoice = vs.find(v=>/es[-_]?(ES)/i.test(v.lang)) || vs.find(v=>/es[-_]?(MX|US|419)/i.test(v.lang)) || vs.find(v=>/^es/i.test(v.lang)) || null;
}
if(TTS){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speakEs(text){
  if(!TTS||!text) return;
  const clean=text.replace(/\(.*?\)/g,'').replace(/[~]/g,'').replace(/\s*\/\s*/g,', ').replace(/\.\.\./g,'').trim();
  if(!clean) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(clean);
  u.lang='es-ES'; if(esVoice)u.voice=esVoice; u.rate=0.88; u.pitch=1;
  const btn=$('speakBtn');
  u.onstart=()=>btn&&btn.classList.add('playing');
  u.onend=()=>btn&&btn.classList.remove('playing');
  speechSynthesis.speak(u);
}

/* 분야 칩 만들기 */
function buildCats(){
  const cats = ['전체', ...new Set(DATA.map(d=>d.c))];
  const box = $('catOpts'); box.innerHTML='';
  cats.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='chip'+(i===0?' on':''); el.dataset.cat=c; el.textContent=c;
    box.appendChild(el);
  });
}
buildCats();
$('totalCount').textContent = DATA.length;

/* 칩 토글 로직 */
function singleSelect(box, on){ [...box.children].forEach(c=>c.classList.remove('on')); on.classList.add('on'); }

$('lessonOpts').addEventListener('click',e=>{
  const c=e.target.closest('.chip'); if(!c)return;
  const l=+c.dataset.lesson;
  if(cfg.lessons.has(l)){ if(cfg.lessons.size>1){cfg.lessons.delete(l);c.classList.remove('on');} }
  else { cfg.lessons.add(l); c.classList.add('on'); }
});
$('catOpts').addEventListener('click',e=>{ const c=e.target.closest('.chip'); if(!c)return; singleSelect($('catOpts'),c); cfg.cat=c.dataset.cat; });
$('dirOpts').addEventListener('click',e=>{ const c=e.target.closest('.chip'); if(!c)return; singleSelect($('dirOpts'),c); cfg.dir=c.dataset.dir; });
$('modeOpts').addEventListener('click',e=>{ const c=e.target.closest('.chip'); if(!c)return; singleSelect($('modeOpts'),c); cfg.mode=c.dataset.mode; });
$('countOpts').addEventListener('click',e=>{ const c=e.target.closest('.chip'); if(!c)return; singleSelect($('countOpts'),c); cfg.count=+c.dataset.count; });
$('autoOpts').addEventListener('click',e=>{ const c=e.target.closest('.chip'); if(!c)return; singleSelect($('autoOpts'),c); cfg.auto=c.dataset.auto==='1'; });
$('speakBtn').addEventListener('click',()=>{ if(queue[idx]) speakEs(queue[idx].es); });

/* ============ 게임 시작 ============ */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function buildQueue(){
  let pool = DATA.filter(d=>cfg.lessons.has(d.l) && (cfg.cat==='전체'||d.c===cfg.cat));
  pool = shuffle(pool);
  if(cfg.count>0) pool = pool.slice(0,cfg.count);
  return pool;
}

$('startBtn').addEventListener('click',()=>{
  queue = buildQueue();
  if(queue.length===0){ alert('선택한 조건에 해당하는 단어가 없어요. 다른 조합을 골라주세요.'); return; }
  idx=0; correct=0; streak=0; maxStreak=0; wrong=[];
  $('start').classList.add('hidden'); $('result').classList.add('hidden');
  $('quiz').classList.remove('hidden');
  render();
});

/* 방향 결정 (mix면 랜덤) */
function dirFor(item){
  if(cfg.dir==='mix') return Math.random()<0.5?'es2ko':'ko2es';
  return cfg.dir;
}

let curDir='es2ko';
function render(){
  answered=false;
  const item = queue[idx];
  curDir = dirFor(item);
  const isEs2Ko = curDir==='es2ko';
  const q = isEs2Ko ? item.es : item.ko;
  const a = isEs2Ko ? item.ko : item.es;

  $('qNum').textContent = idx+1;
  $('qTot').textContent = queue.length;
  $('correctN').textContent = correct;
  $('streak').textContent = streak;
  $('progbar').style.width = (idx/queue.length*100)+'%';

  $('qtag').textContent = isEs2Ko ? '스페인어 → 한국어' : '한국어 → 스페인어';
  $('qword').textContent = q;
  $('qword').className = 'qword'+(isEs2Ko?'':' ko');
  $('qhint').textContent = '['+item.l+'과 · '+item.c+']';

  const sb=$('speakBtn');
  if(!TTS){ sb.classList.add('off'); sb.textContent='🔇 발음 미지원'; }
  else { sb.classList.remove('off'); sb.textContent='🔊 발음 듣기'; if(cfg.auto) setTimeout(()=>speakEs(item.es),250); }

  $('feedback').textContent=''; $('feedback').className='feedback';
  $('nextBtn').classList.add('hidden');
  $('answers').classList.add('hidden');
  $('typewrap').classList.add('hidden');
  $('flashans').classList.add('hidden');

  if(cfg.mode==='mc') renderMC(item,a,isEs2Ko);
  else if(cfg.mode==='type') renderType(item,a,isEs2Ko);
  else renderFlash(item,a);
}

/* --- 4지선다 --- */
function renderMC(item,answer,isEs2Ko){
  const box=$('answers'); box.classList.remove('hidden'); box.innerHTML='';
  const key = isEs2Ko?'ko':'es';
  // 같은 언어의 다른 보기 3개
  let others = shuffle(DATA.filter(d=>d[key]!==answer)).slice(0,3).map(d=>d[key]);
  let choices = shuffle([answer,...others]);
  choices.forEach(ch=>{
    const b=document.createElement('button');
    b.className='ans'; b.textContent=ch;
    b.addEventListener('click',()=>pickMC(b,ch,answer,box));
    box.appendChild(b);
  });
}
function pickMC(btn,chosen,answer,box){
  if(answered)return; answered=true;
  const item=queue[idx];
  const ok = chosen===answer;
  [...box.children].forEach(b=>{
    b.disabled=true;
    if(b.textContent===answer) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    else b.classList.add('dim');
  });
  finish(ok,answer);
}

/* --- 직접 입력 --- */
function norm(s){ return s.toLowerCase().trim()
  .replace(/[¡!¿?.,]/g,'')
  .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u').replace(/ü/g,'u').replace(/ñ/g,'n')
  .replace(/\s+/g,' '); }
function acceptable(input, item, isEs2Ko){
  const target = isEs2Ko?item.ko:item.es;
  const ni=norm(input);
  if(!ni) return false;
  // 여러 정답 허용: /, ~ 로 분리된 것들
  let variants = [target];
  // 슬래시/괄호 처리로 관대하게
  variants.push(target.replace(/\(.*?\)/g,'').trim());
  target.split(/[\/,]/).forEach(v=>variants.push(v));
  // 관사 제거 버전(es)
  variants.push(target.replace(/^(el|la|los|las|un|una) /,''));
  variants = variants.map(norm).filter(Boolean);
  return variants.some(v=> v===ni || v.replace(/[~]/g,'').trim()===ni );
}
function renderType(item,answer,isEs2Ko){
  const w=$('typewrap'); w.classList.remove('hidden');
  const inp=$('tinput'); inp.value=''; inp.disabled=false;
  $('accentHint').textContent = isEs2Ko ? '' : '악센트(á é í ó ú ñ)는 없어도 정답 처리돼요';
  setTimeout(()=>inp.focus(),50);
  inp.onkeydown=(e)=>{ if(e.key==='Enter'){ if(!answered) submitType(item,answer,isEs2Ko); else next(); } };
}
function submitType(item,answer,isEs2Ko){
  if(answered)return; answered=true;
  const inp=$('tinput'); inp.disabled=true;
  const ok=acceptable(inp.value,item,isEs2Ko);
  finish(ok,answer);
}

/* --- 플래시카드 --- */
let flashRevealed=false;
function renderFlash(item,answer){
  flashRevealed=false;
  const box=$('flashans'); box.classList.remove('hidden');
  $('qhint').textContent='탭하면 정답이 보여요 · ['+item.l+'과]';
  const qc=document.querySelector('.qcard');
  qc.style.cursor='pointer';
  qc.onclick=()=>{
    if(flashRevealed||answered)return; flashRevealed=true;
    $('feedback').className='feedback'; $('feedback').innerHTML='정답: <b>'+answer+'</b>';
  };
  [...box.children].forEach(b=>{
    b.disabled=false; b.classList.remove('dim');
    b.onclick=()=>{ if(answered)return; answered=true;
      $('feedback').className='feedback'; $('feedback').innerHTML='정답: <b>'+answer+'</b>';
      finish(b.dataset.fc==='yes', answer, true);
    };
  });
}

/* --- 정답 처리 공통 --- */
function finish(ok,answer,silent){
  const item=queue[idx];
  if(ok){ correct++; streak++; maxStreak=Math.max(maxStreak,streak); }
  else { streak=0; wrong.push(item); }
  $('correctN').textContent=correct;
  $('streak').textContent=streak;
  if(cfg.mode!=='flash'){
    const fb=$('feedback');
    if(ok){ fb.className='feedback ok'; fb.innerHTML='정답이에요! 🎉'; }
    else { fb.className='feedback no'; fb.innerHTML='아쉬워요 😢<small>정답: '+answer+'</small>'; }
  }
  const nb=$('nextBtn'); nb.classList.remove('hidden');
  nb.textContent = idx+1<queue.length ? '다음 →' : '결과 보기 🏁';
  nb.focus();
}
$('nextBtn').addEventListener('click',next);
function next(){ idx++; if(idx>=queue.length) showResult(); else render(); }

$('quitBtn').addEventListener('click',()=>{ if(confirm('그만하고 결과를 볼까요?')) showResult(); });

/* ============ 결과 ============ */
function showResult(){
  $('quiz').classList.add('hidden');
  $('result').classList.remove('hidden');
  const done = idx===0?1:idx; // 최소 1
  const total = idx>0?idx:queue.length;
  const pct = Math.round(correct/ (idx>0?idx:1) *100);
  $('rScore').textContent=isFinite(pct)?pct:0;
  $('rCorrect').textContent=correct;
  $('rTotal').textContent= idx>0?idx:0;
  $('rStreak').textContent=maxStreak;
  const em = pct>=90?'🏆':pct>=70?'🎉':pct>=50?'💪':'📚';
  $('rEmoji').textContent=em;

  const rv=$('review');
  if(wrong.length===0){ rv.innerHTML='<h3>완벽해요! 틀린 게 하나도 없어요 ✨</h3>'; $('retryWrong').style.display='none'; }
  else {
    $('retryWrong').style.display='block';
    let h='<h3>❌ 틀린 단어 ('+wrong.length+') · 🔊 눌러 발음 확인</h3>';
    wrong.forEach((w,i)=>{ h+='<div class="rrow"><button class="rspeak" data-i="'+i+'">🔊</button><span class="es">'+w.es+'</span><span class="ko">'+w.ko+'</span></div>'; });
    rv.innerHTML=h;
    const wl=wrong.slice();
    rv.querySelectorAll('.rspeak').forEach(b=>b.onclick=()=>speakEs(wl[+b.dataset.i].es));
  }
}
$('retryWrong').addEventListener('click',()=>{
  if(wrong.length===0)return;
  queue=shuffle(wrong); idx=0; correct=0; streak=0; maxStreak=0; wrong=[];
  $('result').classList.add('hidden'); $('quiz').classList.remove('hidden'); render();
});
$('againBtn').addEventListener('click',()=>{ $('result').classList.add('hidden'); $('start').classList.remove('hidden'); });
</script>
